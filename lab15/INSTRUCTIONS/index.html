<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система учета студентов</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px;
               margin: 0 auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #2B579A; color: white; }
        tr:hover { background: #f5f5f5; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px;
               cursor: pointer; color: white; margin: 2px; }
        .btn-add { background: #28a745; }
        .btn-edit { background: #ffc107; color: #333; }
        .btn-delete { background: #dc3545; }
        .form-group { margin: 10px 0; }
        .form-group label { display: inline-block; width: 120px; }
        .form-group input { padding: 6px; width: 250px; }
        #form-panel { background: #f8f9fa; padding: 15px;
                      border-radius: 8px; margin: 15px 0;
                      display: none; }
    </style>
</head>
<body>
    <h1>Система учета студентов</h1>
    <button class="btn btn-add" onclick="showForm()">
        + Добавить студента</button>
 
    <div id="form-panel">
        <h3 id="form-title">Новый студент</h3>
        <div class="form-group">
            <label>Фамилия:</label>
            <input id="last_name" placeholder="Иванов">
        </div>
        <div class="form-group">
            <label>Имя:</label>
            <input id="first_name" placeholder="Алексей">
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input id="email" placeholder="ivanov@student.edu">
        </div>
        <button class="btn btn-add" onclick="saveStudent()">
            Сохранить</button>
        <button class="btn" onclick="hideForm()"
                style="background:#6c757d">Отмена</button>
    </div>
 
    <table>
        <thead>
            <tr><th>ID</th><th>Фамилия</th><th>Имя</th>
                <th>Группа</th><th>Email</th><th>Действия</th></tr>
        </thead>
        <tbody id="students-table"></tbody>
    </table>
 
    <script src="app.js"></script>
</body>
</html>
